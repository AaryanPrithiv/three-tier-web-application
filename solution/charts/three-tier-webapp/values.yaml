# Default values for three-tier-webapp.
# These defaults aim to be safe for a fresh local cluster, while still demonstrating production-minded patterns.

nameOverride: ""
fullnameOverride: ""

namespace:
  create: false  # Prefer: helm --create-namespace
  name: ""

commonLabels: {}
commonAnnotations: {}

imagePullSecrets: []

frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: devopsghazali/three-tier-web-application-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  podAnnotations: {}
  podLabels: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  securityContext:
    enabled: false
    runAsNonRoot: true
    runAsUser: 101
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}

backend:
  enabled: true
  replicaCount: 2
  image:
    repository: devopsghazali/three-tier-web-application-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5000
  env:
    # DB host defaults to the in-chart postgres service name.
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  podAnnotations: {}
  podLabels: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  securityContext:
    enabled: false
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    # Secret handling:
    # - If existingSecret is set, chart will use it.
    # - Else chart will create a secret and (optionally) generate a password that remains stable across upgrades.
    existingSecret: ""   # e.g. "three-tier-db"
    username: appuser
    database: appdb
    password: ""         # leave empty to auto-generate and persist across upgrades
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""   # empty = default StorageClass
    accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
  podAnnotations: {}
  podLabels: {}
  securityContext:
    enabled: true
    fsGroup: 999
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: true
  className: "nginx"  # e.g. nginx
  annotations: {}
  hosts:
    - host: three-tier.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

rbac:
  createServiceAccounts: true
  automountServiceAccountToken: false
  # Optional: create an "ops" ServiceAccount with limited read-only permissions for troubleshooting.
  opsReadOnly:
    enabled: true

backup:
  enabled: true
  schedule: "0 */6 * * *"  # every 6 hours
  retention: 10
  pvc:
    enabled: true
    size: 2Gi
    storageClassName: ""
    accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
