# Prod-ish overlay: higher availability defaults.
frontend:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
backend:
  replicaCount: 3
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
postgres:
  persistence:
    size: 20Gi
backup:
  schedule: "0 2 * * *"  # daily at 02:00
