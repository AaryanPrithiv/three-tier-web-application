{{- if and .Values.postgres.enabled (not .Values.postgres.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "threeTier.dbSecretName" . }}
  labels:
    {{- include "threeTier.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_DB: {{ .Values.postgres.auth.database | b64enc }}
  POSTGRES_USER: {{ .Values.postgres.auth.username | b64enc }}
  POSTGRES_PASSWORD: {{ include "threeTier.dbPassword" . | b64enc }}
{{- end }}
