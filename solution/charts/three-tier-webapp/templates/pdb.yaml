{{- if and .Values.frontend.enabled .Values.frontend.pdb.enabled (gt (int .Values.frontend.replicaCount) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "threeTier.fullname" . }}-frontend
  labels:
    {{- include "threeTier.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.frontend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "threeTier.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
---
{{- end }}
{{- if and .Values.backend.enabled .Values.backend.pdb.enabled (gt (int .Values.backend.replicaCount) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "threeTier.fullname" . }}-backend
  labels:
    {{- include "threeTier.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "threeTier.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
{{- end }}
