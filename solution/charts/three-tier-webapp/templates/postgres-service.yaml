{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    {{- include "threeTier.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: pg
      port: {{ .Values.postgres.service.port }}
      targetPort: pg
  selector:
    {{- include "threeTier.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
