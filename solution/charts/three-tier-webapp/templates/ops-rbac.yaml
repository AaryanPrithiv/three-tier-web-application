{{- if .Values.rbac.opsReadOnly.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "threeTier.fullname" . }}-ops
  labels:
    {{- include "threeTier.labels" . | nindent 4 }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "threeTier.fullname" . }}-ops-read
  labels:
    {{- include "threeTier.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "threeTier.fullname" . }}-ops-read
  labels:
    {{- include "threeTier.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "threeTier.fullname" . }}-ops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "threeTier.fullname" . }}-ops-read
{{- end }}
